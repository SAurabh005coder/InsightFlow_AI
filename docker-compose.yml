version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: insightflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insightflow_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: insightflow_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/insightflow_ai
      - SECRET_KEY=supersecretkeyinsightflowai1234567890abcdef
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/storage
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: insightflow_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_storage:
